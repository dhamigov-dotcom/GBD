/* ---------------------------------------------------------------------
   HISTORY
--------------------------------------------------------------------- */
function pushHistory(){
  state.history = state.history.slice(0, state.historyIndex+1);
  state.history.push(JSON.stringify(state.shapes));
  if (state.history.length>100) state.history.shift();
  state.historyIndex = state.history.length-1;
  updateRibbonState();
}
function undo(){ if (state.historyIndex<=0) return; state.historyIndex--; state.shapes = JSON.parse(state.history[state.historyIndex]); state.selected.clear(); renderAll(); }
function redo(){ if (state.historyIndex>=state.history.length-1) return; state.historyIndex++; state.shapes = JSON.parse(state.history[state.historyIndex]); state.selected.clear(); renderAll(); }
function updateRibbonState(){ btnUndo.disabled = state.historyIndex<=0; btnRedo.disabled = state.historyIndex>=state.history.length-1; }
pushHistory();

/* ---------------------------------------------------------------------
   SELECTION ACTIONS
--------------------------------------------------------------------- */
function selectOnly(id){ state.selected.clear(); if(id) state.selected.add(id); renderOverlay(); syncStyleInputs(); }
function syncStyleInputs(){
  if (state.selected.size===1){
    const s = findShape([...state.selected][0]);
    if (s && s.stroke){ strokeInput.value=s.stroke; state.strokeColor=s.stroke; }
    if (s && s.strokeWidth){ widthInput.value=s.strokeWidth; state.strokeWidth=s.strokeWidth; }
  }
}
function applyStyleToSelection(){
  if (!state.selected.size) return;
  state.selected.forEach(function(id){
    const s = findShape(id); if (!s) return;
    s.stroke = state.strokeColor; s.strokeWidth = state.strokeWidth;
    if ("dash" in s || ["segment","ray","vector","rect","circle","ellipse","polyline","triangle","polygon","custom","freehand","shape3d"].indexOf(s.type)>=0) s.dash = state.strokeStyle;
    if ("fill" in s) s.fill = state.fillEnabled ? state.fillColor : "none";
  });
  renderAll(); pushHistory();
}
function deleteSelection(){
  if (!state.selected.size) return;
  state.shapes = state.shapes.filter(function(s){return !state.selected.has(s.id);});
  state.selected.clear(); renderAll(); pushHistory();
}
function duplicateSelection(){
  if (!state.selected.size) return;
  const newIds = [];
  state.selected.forEach(function(id){
    const s = findShape(id);
    const copy = JSON.parse(JSON.stringify(s));
    copy.id = nextId();
    translateShape(copy, 20, 20);
    state.shapes.push(copy); newIds.push(copy.id);
  });
  state.selected = new Set(newIds); renderAll(); pushHistory();
}
function arrangeSelection(dir){
  if (!state.selected.size) return;
  state.selected.forEach(function(id){
    const idx = state.shapes.findIndex(function(s){return s.id===id;});
    if (idx<0) return;
    const arr = state.shapes.splice(idx,1); const s = arr[0];
    if (dir>0) state.shapes.push(s); else state.shapes.unshift(s);
  });
  renderAll(); pushHistory();
}
function translateShape(s, dx, dy){
  switch(s.type){
    case "point": case "text": case "equation": s.x+=dx; s.y+=dy; break;
    case "segment": case "ray": case "vector": case "matchstick": case "dialhand": case "bearing": s.x1+=dx;s.y1+=dy;s.x2+=dx;s.y2+=dy; break;
    case "rect": case "shape3d": case "shape2d": case "image": case "table": case "statsgraph": case "venn2": case "venn3":
    case "numberline": case "graphpaper": case "unitcircle": case "tree": case "clock": case "pascal": case "earth":
      s.x+=dx; s.y+=dy; break;
    case "circle": case "ellipse": s.cx+=dx; s.cy+=dy; break;
    case "instrument": s.x+=dx; s.y+=dy; break;
    case "polyline": case "triangle": case "polygon": case "freehand": case "custom": case "smoothline": s.points.forEach(function(p){p.x+=dx;p.y+=dy;}); break;
    case "angle": [s.p1,s.p2,s.p3].forEach(function(p){p.x+=dx;p.y+=dy;}); break;
    case "distance": [s.p1,s.p2].forEach(function(p){p.x+=dx;p.y+=dy;}); break;
  }
}
function setHandlePoint(s, idx, p){
  switch(s.type){
    case "point": case "text": s.x=p.x; s.y=p.y; break;
    case "segment": case "ray": case "vector": case "matchstick": case "dialhand": case "bearing":
      if (idx===0){ s.x1=p.x; s.y1=p.y; } else { s.x2=p.x; s.y2=p.y; } break;
    case "polyline": case "triangle": case "polygon": case "freehand": case "custom": case "smoothline": s.points[idx].x=p.x; s.points[idx].y=p.y; break;
    case "angle": {
      if (idx===0) s.p1=p; else if (idx===1) s.p2=p; else if (idx===2) s.p3=p;
      else { s.r = Math.max(16, Math.min(200, Math.hypot(p.x-s.p2.x, p.y-s.p2.y))); }
      break;
    }
    case "distance": if (idx===0) s.p1=p; else s.p2=p; break;
  }
}

/* ---------------------------------------------------------------------
   POINTER INTERACTION
--------------------------------------------------------------------- */
let drag = null;
let constructionBuffer = [];
let plLineRef = null;

/* Alt+Click => equation editor, highest priority */
svg.addEventListener("pointerdown", function(e){
  if (!e.altKey) return;
  e.preventDefault(); e.stopImmediatePropagation();
  const pt = screenToSVG(e.clientX,e.clientY);
  const hit = topShapeAt(pt);
  if (hit && hit.type==="equation") openEquationEditor({x:hit.x,y:hit.y}, hit);
  else openEquationEditor(pt);
}, true);

svg.addEventListener("pointerdown", function(e){
  if (state.tool==="perp" || state.tool==="parallel"){ handlePerpParallelClick(e); return; }
  if (e.pointerType==="touch" && state.activePointerId!==null) return;
  state.activePointerId = e.pointerId;
  svg.setPointerCapture(e.pointerId);
  const pt0 = screenToSVG(e.clientX, e.clientY);
  const pt = snapPt(pt0);

  if (state.tool==="pan" || e.button===1 || window._spaceHeld){
    drag = { mode:"pan", startClient:{x:e.clientX,y:e.clientY}, startVB:Object.assign({},state.vb) };
    svg.style.cursor="grabbing"; return;
  }

  /* generic control handles (works regardless of active tool) */
  const handleEl = e.target.closest(".handle");
  if (handleEl){
    const hType = handleEl.dataset.handleType;
    const s = findShape(handleEl.dataset.shapeId);
    if (hType==="resize"){ drag = { mode:"bbox-resize", shape:s, handleIdx:parseInt(handleEl.dataset.handle), pivot0:bboxCenter(getBBox(s)), rot:s.rot||0 }; return; }
    if (hType==="rotate"){ const c=bboxCenter(getBBox(s)); drag = { mode:"bbox-rotate", shape:s, center:c, startRot:s.rot||0, startAngle:Math.atan2(pt0.y-c.y,pt0.x-c.x) }; return; }
    if (hType==="vertex"){ drag = { mode:"handle", shape:s, handleIdx:parseInt(handleEl.dataset.handle) }; return; }
  }

  if (state.tool==="select"){
    const hit = topShapeAt(pt0);
    if (hit){
      if (!state.selected.has(hit.id)) selectOnly(hit.id);
      drag = { mode:"move", ids:[...state.selected], last: pt0 };
      updateCustomToolbar();
      updateTextToolbar();
    } else { selectOnly(null); }
    return;
  }

  if (state.tool==="Delete"){
    const hit = topShapeAt(pt0);
    if (hit){ state.shapes = state.shapes.filter(function(s){return s.id!==hit.id;}); renderAll(); pushHistory(); }
    return;
  }

  if (state.tool==="point"){
    const pointStyle = state.pointMode || "labeled";
    const isLabeled = pointStyle === "labeled";
    const shape = {
      id:nextId(),
      type:"point",
      x:pt.x,
      y:pt.y,
      pointStyle: pointStyle,
      stroke: state.strokeColor,
      fill: pointStyle === "hollow" ? "none" : state.strokeColor,
      radius: pointStyle === "solid" ? 6 : (pointStyle === "free" ? 3.5 : 4.5)
    };
    if (isLabeled) shape.label = nextPointLabel();
    addShape(shape);
    renderAll(); pushHistory(); return;
  }

  if (state.tool==="text"){ startTextEdit(pt); return; }

  if (CLICK_PLACE_TOOLS.indexOf(state.tool)>=0){ clickPlaceShape(state.tool, pt); return; }

  if (["segment","ray","vector","rect","ellipse","circle","triangle","polygon","shape3d","shape2d","zigzag","curve",
       "diamcircle","circlebb","angledrect","parallelogram","rhombus","kite","trapezium",
       "matchstick","dialhand","connector","isotri","righttri"].indexOf(state.tool)>=0){
    drag = { mode:"drag-shape", tool:state.tool, start:pt, shiftKey:e.shiftKey };
    return;
  }

  if (state.tool==="pen"){
    state.drawing = { type:"freehand", points:[pt], stroke:state.strokeColor, strokeWidth:state.strokeWidth };
    drag = { mode:"pen" }; return;
  }

  if (state.tool==="polyline" || state.tool==="customshape" || state.tool==="smoothline"){
    const dtype = state.tool==="customshape" ? "custom" : (state.tool==="smoothline" ? "smoothline" : "polyline");
    if (!state.drawing) state.drawing = { type:dtype, points:[pt], stroke:state.strokeColor, strokeWidth:state.strokeWidth, fill: state.tool==="customshape" ? (state.fillEnabled?state.fillColor:"#8fd3c766") : "none" };
    else state.drawing.points.push(pt);
    updatePreview(); return;
  }

  if (["midpoint","angle","distance","bisector"].indexOf(state.tool)>=0){ handleConstructionClick(pt0, pt); return; }
  if (["circle3pt","ellipsefoci","parabolafv","parabolafd","hyperbola","arc3pt","arccentre","ellipticalarc","parabolicarc","bearings"].indexOf(state.tool)>=0){
    handleGeometryConstruction(pt0, pt); return;
  }
});

function handlePerpParallelClick(e){
  const pt0 = screenToSVG(e.clientX,e.clientY);
  if (!plLineRef){
    const hit = topShapeAt(pt0);
    if (hit && ["segment","ray","vector"].indexOf(hit.type)>=0){ plLineRef = hit; hintBox.textContent = "Now click the point to pass the line through."; }
    return;
  }
  const p = nearestPointShape(pt0) || snapPt(pt0);
  const dx = plLineRef.x2-plLineRef.x1, dy = plLineRef.y2-plLineRef.y1;
  const len = Math.max(state.vb.w,state.vb.h);
  let ang = Math.atan2(dy,dx);
  if (state.tool==="perp") ang += Math.PI/2;
  addShape({ id:nextId(), type:"segment", x1:p.x-len*Math.cos(ang), y1:p.y-len*Math.sin(ang), x2:p.x+len*Math.cos(ang), y2:p.y+len*Math.sin(ang), stroke:state.strokeColor, strokeWidth: Math.max(1.2,state.strokeWidth*0.8), fill:"none" });
  plLineRef=null; renderAll(); pushHistory();
  hintBox.textContent = toolLabel(state.tool)+" line constructed.";
}

svg.addEventListener("pointermove", function(e){
  const pt0 = screenToSVG(e.clientX, e.clientY);
  const pt = snapPt(pt0);
  updateCursorGuide(pt0);
  statusBar.textContent = "x: "+pt0.x.toFixed(1)+"  y: "+pt0.y.toFixed(1)+"  ·  "+toolLabel(state.tool);

  if (!drag){ if ((state.tool==="polyline"||state.tool==="customshape"||state.tool==="smoothline") && state.drawing){ updatePreview(pt); } return; }

  if (drag.mode==="pan"){
    const r = svg.getBoundingClientRect();
    const dx = (e.clientX-drag.startClient.x)/r.width*drag.startVB.w;
    const dy = (e.clientY-drag.startClient.y)/r.height*drag.startVB.h;
    state.vb.x = drag.startVB.x - dx; state.vb.y = drag.startVB.y - dy;
    setViewBox(); return;
  }
  if (drag.mode==="move"){
    customToolbar.style.display = "none";
    const dx = pt0.x-drag.last.x, dy = pt0.y-drag.last.y;
    drag.ids.forEach(function(id){ const s=findShape(id); if (s) translateShape(s,dx,dy); });
    drag.last = pt0; renderAll(); return;
  }
  if (drag.mode==="handle"){ setHandlePoint(drag.shape, drag.handleIdx, pt); renderAll(); return; }
  if (drag.mode==="bbox-resize"){
    const s = drag.shape;
    const local = rotatePt(pt0, drag.pivot0, -drag.rot);
    const origBB = getBBox(s); // note: mutated progressively but corner math below is self-correcting frame-to-frame
    const startBB = drag.startBB || (drag.startBB = Object.assign({}, origBB));
    const corners = [
      {x:startBB.x,y:startBB.y},{x:startBB.x+startBB.w/2,y:startBB.y},{x:startBB.x+startBB.w,y:startBB.y},
      {x:startBB.x+startBB.w,y:startBB.y+startBB.h/2},{x:startBB.x+startBB.w,y:startBB.y+startBB.h},{x:startBB.x+startBB.w/2,y:startBB.y+startBB.h},
      {x:startBB.x,y:startBB.y+startBB.h},{x:startBB.x,y:startBB.y+startBB.h/2}
    ];
    const opp = corners[(drag.handleIdx+4)%8];
    let nx=startBB.x, ny=startBB.y, nw=startBB.w, nh=startBB.h;
    const idx = drag.handleIdx;
    if ([0,2,4,6].indexOf(idx)>=0){
      nx = Math.min(opp.x, local.x); ny = Math.min(opp.y, local.y);
      nw = Math.abs(opp.x-local.x); nh = Math.abs(opp.y-local.y);
    } else if (idx===1||idx===5){
      ny = Math.min(opp.y, local.y); nh = Math.abs(opp.y-local.y); nx = startBB.x; nw = startBB.w;
    } else {
      nx = Math.min(opp.x, local.x); nw = Math.abs(opp.x-local.x); ny = startBB.y; nh = startBB.h;
    }
    setBBox(s, {x:nx,y:ny,w:Math.max(nw,4),h:Math.max(nh,4)});
    renderAll(); return;
  }
  if (drag.mode==="bbox-rotate"){
    const s = drag.shape;
    const curAngle = Math.atan2(pt0.y-drag.center.y, pt0.x-drag.center.x);
    s.rot = drag.startRot + (curAngle-drag.startAngle)*180/Math.PI;
    renderAll(); return;
  }
  if (drag.mode==="pen"){ state.drawing.points.push(pt0); updatePreview(); return; }
  if (drag.mode==="drag-shape"){ updatePreview(pt, drag); return; }
});

svg.addEventListener("pointerup", function(e){
  state.activePointerId = null;
  if (!drag){ return; }
  const pt0 = screenToSVG(e.clientX, e.clientY);
  const pt = snapPt(pt0);

  if (drag.mode==="pan"){
    svg.style.cursor = state.tool==="pan"?"grab":"crosshair"; drag=null;
    if (state.shapes.some(function(s){return s.type==="funcplot";})) renderAll();
    return;
  }
  if (drag.mode==="bbox-resize" && drag.shape && drag.shape.type==="equation" && drag.shape.mode==="professional"){
    const s = drag.shape;
    const oldBB = getBBox(s);
    equationToDataURI(s.latex, s.fontSize, s.stroke).then(function(result){
      if (result){
        s._w = result.w; s._h = result.h;
        s.x = oldBB.x+8; s.y = oldBB.y+s._h-6;
        s.png = result.dataUri; s._lastBakedFontSize = s.fontSize;
      }
      renderAll(); pushHistory();
    });
    drag=null; return;
  }
  if (["move","handle","bbox-resize","bbox-rotate"].indexOf(drag.mode)>=0){ pushHistory(); drag=null; renderAll(); return; }

  if (drag.mode==="pen"){
    // A plain click (no drag) still gets a mark: duplicate the single point so the
    // stroke has a start and end at the same spot — with round line caps this renders
    // as a small dot, matching what a click with the mouse/pen should always do.
    if (state.drawing.points.length===1) state.drawing.points.push(state.drawing.points[0]);
    addShape(Object.assign({ id:nextId() }, state.drawing));
    state.drawing=null; clearPreview(); drag=null; renderAll(); pushHistory(); return;
  }
  if (drag.mode==="drag-shape"){ commitDragShape(drag.start, pt, drag); drag=null; return; }
});

svg.addEventListener("dblclick", function(e){
  if ((state.tool==="polyline"||state.tool==="customshape"||state.tool==="smoothline") && state.drawing){ finishPolyline(); return; }
  if (state.tool==="select"){
    const pt = screenToSVG(e.clientX,e.clientY);
    const hit = topShapeAt(pt);
    if (hit && hit.type==="equation") openEquationEditor({x:hit.x,y:hit.y}, hit);
    else if (hit && hit.type==="text") startTextEdit({x:hit.x,y:hit.y}, hit);
  }
});

/* Right-click: place a new text box with the Text tool, or edit an existing
   text/equation shape when using Select — mirrors what double-click does,
   and suppresses the browser's own context menu on the drawing surface. */
svg.addEventListener("contextmenu", function(e){
  e.preventDefault();
  const pt = screenToSVG(e.clientX,e.clientY);
  if (state.tool==="text"){ startTextEdit(pt); return; }
  if (state.tool==="select"){
    const hit = topShapeAt(pt);
    if (hit && hit.type==="equation") openEquationEditor({x:hit.x,y:hit.y}, hit);
    else if (hit && hit.type==="text") startTextEdit({x:hit.x,y:hit.y}, hit);
  }
});
/* Keyboard-shortcut → tool map. Letters chosen to avoid clashing with the
   Ctrl/Cmd shortcuts above (undo/redo/duplicate/cut/paste) since those all
   require a modifier key, while these fire on the bare letter only. */
const TOOL_SHORTCUTS = {
  "v": ()=> setTool("select"),
  "h": ()=> setTool("pan"),
  "o": ()=> setTool("point"),
  "l": ()=>{ state.segVariant="line"; setTool("segment"); },
  "y": ()=> setTool("ray"),
  "k": ()=> setTool("vector"),
  "w": ()=> setTool("polyline"),
  "z": ()=> setTool("zigzag"),
  "u": ()=> setTool("curve"),
  "p": ()=> setTool("pen"),
  "m": ()=> setTool("midpoint"),
  "j": ()=> setTool("perp"),
  "f": ()=> setTool("parallel"),
  "b": ()=> setTool("bisector"),
  "c": ()=> setTool("circle"),
  "g": ()=> setTool("ellipse"),
  "r": ()=>{ state.rectRounded=false; setTool("rect"); },
  "i": ()=> setTool("triangle"),
  "n": ()=> setTool("polygon"),
  "q": ()=> setTool("customshape"),
  "a": ()=> setTool("angle"),
  "d": ()=> setTool("distance"),
  "t": ()=>{ state.textTitleMode=false; state.textListMode=false; setTool("text"); },
  "e": ()=> setTool("Delete"),
};

window.addEventListener("keydown",function(e){
  if (e.key==="Escape"){ cancelDrawing(); plLineRef=null; constructionBuffer=[]; closeEquationEditor(); closeFlyout(); }
  if (e.key==="Enter" && (state.tool==="polyline"||state.tool==="customshape"||state.tool==="smoothline") && state.drawing){ finishPolyline(); }
  if (e.key==="Delete" || e.key==="Backspace"){
    if (document.activeElement.tagName!=="INPUT" && document.activeElement.tagName!=="TEXTAREA" && !document.querySelector(".editableText")) deleteSelection();
  }
  if ((e.ctrlKey||e.metaKey) && e.key==="z"){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); }
  if ((e.ctrlKey||e.metaKey) && e.key==="d"){ e.preventDefault(); duplicateSelection(); }
  if ((e.ctrlKey||e.metaKey) && e.key==="x"){
    if (state.selected.size===1){ const s=findShape([...state.selected][0]); if (s && s.type==="custom"){ e.preventDefault(); cutCustomShape(s.id); } }
  }
  if ((e.ctrlKey||e.metaKey) && e.key==="v"){ if (state.clipboard){ e.preventDefault(); pasteClipboard(); } }
  if (e.code==="Space"){ e.preventDefault(); svg.style.cursor="grab"; window._spaceHeld=true; }

  /* -----------------------------------------------------------------
     TOOL KEYBOARD SHORTCUTS — single letter, no modifier keys, ignored
     while typing in an input/textarea/contenteditable text box.
  --------------------------------------------------------------------*/
  if (!e.ctrlKey && !e.metaKey && !e.altKey){
    const tag = document.activeElement && document.activeElement.tagName;
    const typing = tag==="INPUT" || tag==="TEXTAREA" ||
      (document.activeElement && document.activeElement.isContentEditable) ||
      document.querySelector(".editableText");
    if (!typing){
      const k = e.key.length===1 ? e.key.toLowerCase() : e.key;
      const shortcut = TOOL_SHORTCUTS[k];
      if (shortcut){ e.preventDefault(); shortcut(); }
    }
  }
});
window.addEventListener("keyup",function(e){ if (e.code==="Space"){ window._spaceHeld=false; svg.style.cursor = state.tool==="select"?"default":"crosshair"; } });

svg.addEventListener("wheel", function(e){
  e.preventDefault();
  const factor = e.deltaY>0 ? 1.08 : 0.93;
  zoomBy(factor, {x:e.clientX,y:e.clientY});
}, { passive:false });

function cancelDrawing(){ state.drawing=null; drag=null; clearPreview(); }
function finishPolyline(){
  if (state.drawing && state.drawing.points.length>1) addShape(Object.assign({ id:nextId() }, state.drawing));
  state.drawing=null; clearPreview(); renderAll(); pushHistory();
}

/* ---- preview while drawing ---- */
function clearPreview(){ previewLayer.innerHTML=""; }
function updatePreview(hoverPt, dragInfo){
  clearPreview();
  if (state.tool==="pen" && state.drawing){
    previewLayer.appendChild(svgEl("path",{ d: smoothPath(state.drawing.points), stroke:state.drawing.stroke, "stroke-width":state.drawing.strokeWidth, fill:"none","stroke-linecap":"round" }));
    return;
  }
  if ((state.tool==="polyline"||state.tool==="customshape"||state.tool==="smoothline") && state.drawing){
    const pts = hoverPt? state.drawing.points.concat([hoverPt]) : state.drawing.points;
    const closePreview = state.tool==="customshape" && pts.length>2;
    const d = state.tool==="smoothline" ? smoothPath(pts) : pointsToPath(pts,closePreview);
    previewLayer.appendChild(svgEl("path",{ d: d, stroke:state.drawing.stroke,"stroke-width":state.drawing.strokeWidth, fill:"none", "stroke-dasharray":"4 3" }));
    pts.forEach(function(p){ previewLayer.appendChild(svgEl("circle",{cx:p.x,cy:p.y,r:3,fill:state.strokeColor})); });
    return;
  }
  if (dragInfo && dragInfo.mode==="drag-shape" && hoverPt){
    const shape = buildDraggedShape(dragInfo.tool, dragInfo.start, hoverPt, dragInfo.shiftKey);
    if (shape){ const clone = Object.assign({}, shape, {id:"preview"}); previewLayer.appendChild(renderShape(clone)); }
  }
}

function buildDraggedShape(tool, p1, p2, shiftKey){
  const style = baseStyle();
  switch(tool){
    case "segment":
      return Object.assign({ type:"segment", variant: state.segVariant||"line", x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y }, style);
    case "ray": case "vector":
      return Object.assign({ type:tool, x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y }, style);
    case "matchstick": case "dialhand":
      return Object.assign({ type:tool, x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y }, style);
    case "connector": {
      const corner = { x:p2.x, y:p1.y };
      return { type:"polyline", points:[{x:p1.x,y:p1.y}, corner, {x:p2.x,y:p2.y}], fill:"none", stroke:style.stroke, strokeWidth:style.strokeWidth, dash:style.dash };
    }
    case "rect": {
      let w = p2.x-p1.x, h=p2.y-p1.y;
      if (shiftKey){ const sN=Math.max(Math.abs(w),Math.abs(h)); w=(w<0?-1:1)*sN; h=(h<0?-1:1)*sN; }
      return Object.assign({ type:"rect", x:Math.min(p1.x,p1.x+w), y:Math.min(p1.y,p1.y+h), w:Math.abs(w), h:Math.abs(h), rot:0, rounded: !!state.rectRounded }, style);
    }
    case "angledrect": {
      const dx=p2.x-p1.x, dy=p2.y-p1.y;
      const len=Math.hypot(dx,dy)||1;
      const nx=-dy/len, ny=dx/len;
      const h = len*0.6;
      const p3 = { x:p2.x+nx*h, y:p2.y+ny*h };
      const p4 = { x:p1.x+nx*h, y:p1.y+ny*h };
      return { type:"polygon", points:[{x:p1.x,y:p1.y},{x:p2.x,y:p2.y},p3,p4], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "parallelogram": {
      const x=Math.min(p1.x,p2.x), y=Math.min(p1.y,p2.y), w=Math.abs(p2.x-p1.x), h=Math.abs(p2.y-p1.y);
      const sk = w*0.28;
      return { type:"polygon", points:[{x:x+sk,y:y},{x:x+w,y:y},{x:x+w-sk,y:y+h},{x:x,y:y+h}], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "rhombus": {
      const x=Math.min(p1.x,p2.x), y=Math.min(p1.y,p2.y), w=Math.abs(p2.x-p1.x), h=Math.abs(p2.y-p1.y);
      return { type:"polygon", points:[{x:x+w/2,y:y},{x:x+w,y:y+h/2},{x:x+w/2,y:y+h},{x:x,y:y+h/2}], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "kite": {
      const x=Math.min(p1.x,p2.x), y=Math.min(p1.y,p2.y), w=Math.abs(p2.x-p1.x), h=Math.abs(p2.y-p1.y);
      return { type:"polygon", points:[{x:x+w/2,y:y},{x:x+w,y:y+h*0.38},{x:x+w/2,y:y+h},{x:x,y:y+h*0.38}], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "trapezium": {
      const x=Math.min(p1.x,p2.x), y=Math.min(p1.y,p2.y), w=Math.abs(p2.x-p1.x), h=Math.abs(p2.y-p1.y);
      return { type:"polygon", points:[{x:x+w*0.22,y:y},{x:x+w*0.78,y:y},{x:x+w,y:y+h},{x:x,y:y+h}], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "isotri": {
      const dx=p2.x-p1.x, dy=p2.y-p1.y;
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
      const len=Math.hypot(dx,dy);
      const nx=-dy/(len||1), ny=dx/(len||1);
      const h = len*0.9;
      const apex = { x:mx+nx*h, y:my+ny*h };
      return { type:"triangle", points:[{x:p1.x,y:p1.y},{x:p2.x,y:p2.y},apex], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "righttri": {
      const apex = { x:p1.x, y:p2.y };
      return { type:"triangle", points:[{x:p1.x,y:p1.y},{x:p2.x,y:p2.y},apex], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "ellipse":
      return Object.assign({ type:"ellipse", cx:(p1.x+p2.x)/2, cy:(p1.y+p2.y)/2, rx:Math.abs(p2.x-p1.x)/2, ry:Math.abs(p2.y-p1.y)/2, rot:0 }, style);
    case "circle": {
      const r = Math.hypot(p2.x-p1.x,p2.y-p1.y);
      return Object.assign({ type:"circle", cx:p1.x, cy:p1.y, rx:r, ry:r, rot:0 }, style);
    }
    case "diamcircle": {
      const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2, r=Math.hypot(p2.x-p1.x,p2.y-p1.y)/2;
      return Object.assign({ type:"circle", cx:cx, cy:cy, rx:r, ry:r, rot:0 }, style);
    }
    case "circlebb": {
      const r = Math.hypot(p2.x-p1.x,p2.y-p1.y)/2 || 1;
      const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
      return Object.assign({ type:"circle", cx:cx, cy:cy, rx:r, ry:r, rot:0 }, style);
    }
    case "shape3d": {
      let w = p2.x-p1.x, h=p2.y-p1.y;
      return { type:"shape3d", subtype:state.shape3dType, x:Math.min(p1.x,p1.x+w), y:Math.min(p1.y,p1.y+h), w:Math.abs(w)||60, h:Math.abs(h)||60, rot:0, stroke:style.stroke, strokeWidth:style.strokeWidth, fill:style.fill };
    }
    case "shape2d": {
      let w = p2.x-p1.x, h=p2.y-p1.y;
      return { type:"shape2d", subtype:state.shape2dType, x:Math.min(p1.x,p1.x+w), y:Math.min(p1.y,p1.y+h), w:Math.abs(w)||60, h:Math.abs(h)||60, rot:0, stroke:style.stroke, strokeWidth:style.strokeWidth, fill:style.fill };
    }
    case "triangle": {
      const dx=p2.x-p1.x, dy=p2.y-p1.y;
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
      const len=Math.hypot(dx,dy);
      const nx=-dy/ (len||1), ny=dx/(len||1);
      const h = len*Math.sqrt(3)/2;
      const apex = { x:mx+nx*h, y:my+ny*h };
      return { type:"triangle", points:[{x:p1.x,y:p1.y},{x:p2.x,y:p2.y},apex], fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "polygon": {
      const r2 = Math.hypot(p2.x-p1.x, p2.y-p1.y);
      const rot = Math.atan2(p2.y-p1.y, p2.x-p1.x);
      const n = state.regSides;
      const pts=[];
      for (let i=0;i<n;i++){ const a = rot + i*2*Math.PI/n; pts.push({ x:p1.x+r2*Math.cos(a), y:p1.y+r2*Math.sin(a) }); }
      return { type:"polygon", points:pts, fill:style.fill, stroke:style.stroke, strokeWidth:style.strokeWidth };
    }
    case "zigzag": {
      const n = 8; const pts=[];
      const dx=(p2.x-p1.x)/n, dy=(p2.y-p1.y)/n;
      const nx=-dy, ny=dx; const len=Math.hypot(nx,ny)||1; const amp=Math.hypot(p2.x-p1.x,p2.y-p1.y)*0.06;
      for (let i=0;i<=n;i++){
        const bx=p1.x+dx*i, by=p1.y+dy*i;
        const off = (i%2===0)?0:amp;
        pts.push({x:bx+(nx/len)*off, y:by+(ny/len)*off});
      }
      return { type:"polyline", points:pts, fill:"none", stroke:style.stroke, strokeWidth:style.strokeWidth, dash:style.dash };
    }
    case "curve": {
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
      const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
      const nx=-dy/len, ny=dx/len, bend=len*0.22;
      const ctrl = { x:mx+nx*bend, y:my+ny*bend };
      const pts=[]; const N=16;
      for (let i=0;i<=N;i++){
        const t=i/N;
        const x = (1-t)*(1-t)*p1.x + 2*(1-t)*t*ctrl.x + t*t*p2.x;
        const y = (1-t)*(1-t)*p1.y + 2*(1-t)*t*ctrl.y + t*t*p2.y;
        pts.push({x:x,y:y});
      }
      return { type:"polyline", points:pts, fill:"none", stroke:style.stroke, strokeWidth:style.strokeWidth, dash:style.dash };
    }
  }
  return null;
}
function commitDragShape(p1, p2, dragInfo){
  if (Math.hypot(p2.x-p1.x,p2.y-p1.y) < 2){ clearPreview(); return; }
  const shape = buildDraggedShape(dragInfo.tool, p1, p2, dragInfo.shiftKey);
  if (shape){
    addShape(Object.assign({ id:nextId() }, shape));
    if (shape.type==="segment" && shape.variant==="midpoint"){
      addShape({ id:nextId(), type:"point", x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2, label:nextPointLabel()+"'", stroke:state.strokeColor });
    }
  }
  clearPreview(); renderAll(); pushHistory();
}

/* ---- construction tools ---- */
function handleConstructionClick(rawPt, snapped){
  const existing = nearestPointShape(rawPt);
  const p = existing ? {x:existing.x,y:existing.y} : snapped;
  constructionBuffer.push(p);
  if (state.tool==="midpoint" && constructionBuffer.length===2){
    const a=constructionBuffer[0], b=constructionBuffer[1];
    addShape({ id:nextId(), type:"point", x:(a.x+b.x)/2, y:(a.y+b.y)/2, label:nextPointLabel()+"'", stroke:"#c96a3d" });
    constructionBuffer=[]; renderAll(); pushHistory();
  }
  if (state.tool==="distance" && constructionBuffer.length===2){
    const a=constructionBuffer[0], b=constructionBuffer[1];
    addShape({ id:nextId(), type:"distance", p1:a, p2:b });
    constructionBuffer=[]; renderAll(); pushHistory();
  }
  if (state.tool==="angle" && constructionBuffer.length===3){
    const a=constructionBuffer[0], v=constructionBuffer[1], b=constructionBuffer[2];
    addShape({ id:nextId(), type:"angle", p1:a, p2:v, p3:b });
    constructionBuffer=[]; renderAll(); pushHistory();
  }
  if (state.tool==="bisector" && constructionBuffer.length===3){
    const a=constructionBuffer[0], v=constructionBuffer[1], b=constructionBuffer[2];
    const a1=Math.atan2(a.y-v.y,a.x-v.x), a2=Math.atan2(b.y-v.y,b.x-v.x);
    let mid=(a1+a2)/2; if (Math.abs(a1-a2)>Math.PI) mid+=Math.PI;
    const len = Math.max(state.vb.w,state.vb.h);
    addShape({ id:nextId(), type:"ray", x1:v.x,y1:v.y, x2:v.x+len*Math.cos(mid), y2:v.y+len*Math.sin(mid), stroke:state.strokeColor, strokeWidth:state.strokeWidth, fill:"none" });
    constructionBuffer=[]; renderAll(); pushHistory();
  }
}

/* ---- extra geometry constructions: circles/ellipse/parabola/hyperbola/arc/bearings ---- */
function circumcircle(a,b,c){
  const ax=a.x,ay=a.y,bx=b.x,by=b.y,cx=c.x,cy=c.y;
  const d = 2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
  if (Math.abs(d)<1e-6) return null;
  const ux = ((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
  const uy = ((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
  return { x:ux, y:uy, r:Math.hypot(ax-ux,ay-uy) };
}
function sampleEllipsePoints(cx,cy,a,b,rotRad){
  const pts=[]; const N=64;
  for (let i=0;i<=N;i++){
    const t = i/N*Math.PI*2;
    const ex = a*Math.cos(t), ey=b*Math.sin(t);
    pts.push({ x:cx+ex*Math.cos(rotRad)-ey*Math.sin(rotRad), y:cy+ex*Math.sin(rotRad)+ey*Math.cos(rotRad) });
  }
  return pts;
}
function sampleArcThrough(cx,cy,r,a1,a2,a3){
  function norm(a){ while(a<0)a+=Math.PI*2; while(a>=Math.PI*2)a-=Math.PI*2; return a; }
  a1=norm(a1); a2=norm(a2); a3=norm(a3);
  let diff = a3-a1; if (diff<0) diff+=Math.PI*2;
  let midDiff = a2-a1; if (midDiff<0) midDiff+=Math.PI*2;
  let sweep = diff;
  if (midDiff>diff) sweep = diff-Math.PI*2;
  const pts=[]; const N=48;
  for (let i=0;i<=N;i++){ const a=a1+sweep*i/N; pts.push({x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)}); }
  return pts;
}
function handleGeometryConstruction(rawPt, snapped){
  const existing = nearestPointShape(rawPt);
  const p = existing ? {x:existing.x,y:existing.y} : snapped;
  constructionBuffer.push(p);
  const tool = state.tool;

  if (tool==="circle3pt" && constructionBuffer.length===3){
    const c = circumcircle(constructionBuffer[0],constructionBuffer[1],constructionBuffer[2]);
    if (c) addShape(Object.assign({ id:nextId(), type:"circle", cx:c.x, cy:c.y, rx:c.r, ry:c.r, rot:0 }, baseStyle()));
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if (tool==="ellipsefoci" && constructionBuffer.length===3){
    const f1=constructionBuffer[0], f2=constructionBuffer[1], p3=constructionBuffer[2];
    const a = (Math.hypot(p3.x-f1.x,p3.y-f1.y)+Math.hypot(p3.x-f2.x,p3.y-f2.y))/2;
    const c = Math.hypot(f2.x-f1.x,f2.y-f1.y)/2;
    const b = Math.sqrt(Math.max(a*a-c*c,1));
    const cx=(f1.x+f2.x)/2, cy=(f1.y+f2.y)/2;
    const rot = Math.atan2(f2.y-f1.y, f2.x-f1.x);
    const pts = sampleEllipsePoints(cx,cy,a,b,rot);
    addShape(Object.assign({ id:nextId(), type:"polygon", points:pts, fill:"none" }, baseStyle()));
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if ((tool==="parabolafv"||tool==="parabolicarc") && constructionBuffer.length===2){
    const v=constructionBuffer[0], f=constructionBuffer[1];
    const dx=f.x-v.x, dy=f.y-v.y;
    const p4 = Math.hypot(dx,dy)||1;
    const axisAng = Math.atan2(dy,dx);
    const pts=[]; const N=48;
    for (let i=-N/2;i<=N/2;i++){
      const t = i/(N/2)*p4*2.2;
      const localX = t*t/(4*p4), localY = t;
      pts.push({ x:v.x+localX*Math.cos(axisAng)-localY*Math.sin(axisAng), y:v.y+localX*Math.sin(axisAng)+localY*Math.cos(axisAng) });
    }
    addShape(Object.assign({ id:nextId(), type:"polyline", points:pts, fill:"none" }, baseStyle()));
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if (tool==="parabolafd" && constructionBuffer.length===2){
    const f=constructionBuffer[0], dpt=constructionBuffer[1];
    const dx=dpt.x-f.x, dy=dpt.y-f.y;
    const distFD = Math.hypot(dx,dy)||1;
    const v = { x:(f.x+dpt.x)/2, y:(f.y+dpt.y)/2 };
    const axisAng = Math.atan2(dy,dx);
    const p4 = distFD/2;
    const pts=[]; const N=48;
    for (let i=-N/2;i<=N/2;i++){
      const t = i/(N/2)*p4*2.2;
      const localX = t*t/(4*(p4||1)), localY = t;
      pts.push({ x:v.x+localX*Math.cos(axisAng)-localY*Math.sin(axisAng), y:v.y+localX*Math.sin(axisAng)+localY*Math.cos(axisAng) });
    }
    addShape(Object.assign({ id:nextId(), type:"polyline", points:pts, fill:"none" }, baseStyle()));
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if (tool==="hyperbola" && constructionBuffer.length===3){
    const f1=constructionBuffer[0], f2=constructionBuffer[1], p3=constructionBuffer[2];
    const a = Math.abs(Math.hypot(p3.x-f1.x,p3.y-f1.y)-Math.hypot(p3.x-f2.x,p3.y-f2.y))/2 || 10;
    const c = Math.hypot(f2.x-f1.x,f2.y-f1.y)/2;
    const b = Math.sqrt(Math.max(c*c-a*a,1));
    const cx=(f1.x+f2.x)/2, cy=(f1.y+f2.y)/2;
    const rot = Math.atan2(f2.y-f1.y, f2.x-f1.x);
    const N=40; const branch1=[], branch2=[];
    for (let i=-N;i<=N;i++){
      const t = i/N*1.5;
      const lx = a*Math.cosh(t), ly = b*Math.sinh(t);
      branch1.push({ x:cx+lx*Math.cos(rot)-ly*Math.sin(rot), y:cy+lx*Math.sin(rot)+ly*Math.cos(rot) });
      branch2.push({ x:cx-lx*Math.cos(rot)-ly*Math.sin(rot), y:cy-lx*Math.sin(rot)+ly*Math.cos(rot) });
    }
    addShape(Object.assign({ id:nextId(), type:"polyline", points:branch1, fill:"none" }, baseStyle()));
    addShape(Object.assign({ id:nextId(), type:"polyline", points:branch2, fill:"none" }, baseStyle()));
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if ((tool==="arc3pt"||tool==="ellipticalarc") && constructionBuffer.length===3){
    const c = circumcircle(constructionBuffer[0],constructionBuffer[1],constructionBuffer[2]);
    if (c){
      const a1 = Math.atan2(constructionBuffer[0].y-c.y, constructionBuffer[0].x-c.x);
      const a2 = Math.atan2(constructionBuffer[1].y-c.y, constructionBuffer[1].x-c.x);
      const a3 = Math.atan2(constructionBuffer[2].y-c.y, constructionBuffer[2].x-c.x);
      const pts = sampleArcThrough(c.x,c.y,c.r,a1,a2,a3);
      addShape(Object.assign({ id:nextId(), type:"polyline", points:pts, fill:"none" }, baseStyle()));
    }
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if (tool==="arccentre" && constructionBuffer.length===3){
    const c=constructionBuffer[0], sPt=constructionBuffer[1], ePt=constructionBuffer[2];
    const r = Math.hypot(sPt.x-c.x, sPt.y-c.y);
    const a1 = Math.atan2(sPt.y-c.y, sPt.x-c.x);
    let a2 = Math.atan2(ePt.y-c.y, ePt.x-c.x);
    const pts=[]; const N=48;
    let diff=a2-a1; while(diff<0) diff+=Math.PI*2;
    for (let i=0;i<=N;i++){ const a=a1+diff*i/N; pts.push({x:c.x+r*Math.cos(a), y:c.y+r*Math.sin(a)}); }
    addShape(Object.assign({ id:nextId(), type:"polyline", points:pts, fill:"none" }, baseStyle()));
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
  if (tool==="bearings" && constructionBuffer.length===2){
    const a=constructionBuffer[0], b=constructionBuffer[1];
    let bearing = Math.atan2(b.x-a.x, -(b.y-a.y))*180/Math.PI;
    if (bearing<0) bearing+=360;
    addShape({ id:nextId(), type:"bearing", x1:a.x,y1:a.y,x2:b.x,y2:b.y, bearing:bearing, stroke:state.strokeColor, strokeWidth:state.strokeWidth });
    constructionBuffer=[]; renderAll(); pushHistory(); return;
  }
}

/* ---------------------------------------------------------------------
   TEXT EDITING
--------------------------------------------------------------------- */
function startTextEdit(pt, existingShape){
  const s0 = svgToScreen(pt);
  const isTitle = existingShape ? !!existingShape.bold : !!state.textTitleMode;
  const isList = !existingShape && !!state.textListMode;
  const baseFontSize = existingShape ? (existingShape.fontSize||state.textFontSize)
    : (isTitle ? Math.round(state.textFontSize*1.6) : state.textFontSize);
  const div = document.createElement("div");
  div.className="editableText"; div.contentEditable="true";
  div.style.left = (s0.x-4)+"px"; div.style.top=(s0.y-baseFontSize)+"px";
  div.style.fontSize = baseFontSize+"px"; div.style.color = existingShape ? (existingShape.stroke||state.strokeColor) : state.strokeColor;
  if (isTitle) div.style.fontWeight = "700";
  div.style.background = "#ffffff"; div.style.minWidth = "40px";
  canvasWrap.appendChild(div);
  if (existingShape) div.textContent = existingShape.text || "";
  div.focus();
  if (existingShape){
    // put caret at end and select all so typing replaces, or user can click to position caret
    const range = document.createRange(); range.selectNodeContents(div);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  }
  if (isList) div.textContent = "\u2022 ";

  // Live resize handle: drag it to grow/shrink the box, scaling the letters with it
  // while you're still typing (not just after the shape is committed).
  let currentFontSize = baseFontSize;
  const handle = document.createElement("div");
  handle.className = "textResizeHandle";
  handle.contentEditable = "false";
  div.appendChild(handle);
  let resizing = null;
  handle.addEventListener("pointerdown", function(e){
    e.preventDefault(); e.stopPropagation();
    resizing = { startY:e.clientY, startFont:currentFontSize };
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener("pointermove", function(e){
    if (!resizing) return;
    e.stopPropagation();
    const dy = e.clientY - resizing.startY;
    currentFontSize = Math.max(6, Math.min(220, Math.round(resizing.startFont + dy*0.6)));
    div.style.fontSize = currentFontSize+"px";
  });
  handle.addEventListener("pointerup", function(e){ resizing=null; handle.releasePointerCapture(e.pointerId); });

  // hide the original shape's rendered node while its editable overlay is open,
  // so the old text doesn't show through underneath what's being typed
  let origNode = null, origDisplay = "";
  if (existingShape){
    origNode = svg.querySelector('[data-id="'+existingShape.id+'"]');
    if (origNode){ origDisplay = origNode.style.display; origNode.style.display = "none"; }
  }
  function commit(){
    if (resizing) return; // ignore blur fired mid-resize
    let text = "";
    div.childNodes.forEach(function(n){ if (n!==handle) text += n.textContent||""; });
    text = text.trim();
    div.remove();
    if (existingShape){
      if (text){
        existingShape.text = text;
        existingShape.fontSize = currentFontSize;
      } else {
        const idx = state.shapes.findIndex(function(sh){ return sh.id===existingShape.id; });
        if (idx>=0) state.shapes.splice(idx,1);
        state.selected.delete(existingShape.id);
      }
    } else if (text){
      addShape({ id:nextId(), type:"text", x:pt.x, y:pt.y, text:text, fontSize:currentFontSize, stroke:state.strokeColor, bold:isTitle });
    } else if (origNode){
      origNode.style.display = origDisplay;
    }
    renderAll(); pushHistory();
  }
  div.addEventListener("blur", commit, { once:true });
  div.addEventListener("keydown",function(e){ if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); div.blur(); } });
}

/* ---------------------------------------------------------------------
   EQUATION EDITOR (Alt+Click, Unicode / LaTeX, Professional / Linear)
--------------------------------------------------------------------- */
const EQ_SYMBOLS = ["±","∞","=","≠","≤","≥","√","π","∑","∫","∂","→","·","∓","≅","≈","≡","α","β","θ","Δ"];
let eqPanelEl = null;
function closeEquationEditor(){ if (eqPanelEl){ eqPanelEl.remove(); eqPanelEl=null; } }
function linearToLatex(str){
  // lightweight "Word-style" linear -> LaTeX autocorrect: a/b -> \frac{a}{b}, sqrt(x) -> \sqrt{x}
  let s = str;
  s = s.replace(/sqrt\(([^()]+)\)/g, "\\sqrt{$1}");
  s = s.replace(/([A-Za-z0-9_.]+)\/([A-Za-z0-9_.]+)/g, "\\frac{$1}{$2}");
  return s;
}
function equationToDataURI(latex, fontSize, color){
  return new Promise(function(resolve){
    let settled = false;
    function safeResolve(v){ if (!settled){ settled=true; resolve(v); } }
    try{
      measureDiv.innerHTML=""; measureDiv.style.fontSize = fontSize+"px";
      let html = "";
      try{ if (window.katex) html = katex.renderToString(latex, { throwOnError:false, displayMode:false }); }catch(err){}
      if (!html) html = "<span style='font-family:Georgia,serif;font-style:italic'>"+latex+"</span>";
      measureDiv.innerHTML = html;
      const w = Math.max(measureDiv.offsetWidth,20), h = Math.max(measureDiv.offsetHeight,20);
      const pad = 10, fullW = w+pad*2, fullH = h+pad*2;
      // strip @font-face rules: external font URLs inside the SVG can taint the canvas
      // and silently hang rasterization forever, so we drop them and rely on fallback fonts.
      const safeCSS = katexCSSText ? katexCSSText.replace(/@font-face\s*{[^}]*}/g, "") : "";
      const svgStr = '<svg xmlns="'+NS+'" width="'+fullW+'" height="'+fullH+'">'+
        (safeCSS? '<defs><style>'+safeCSS+'</style></defs>':'')+
        '<foreignObject x="0" y="0" width="'+fullW+'" height="'+fullH+'">'+
          '<div xmlns="http://www.w3.org/1999/xhtml" style="padding:'+pad+'px; color:'+color+'; display:inline-block; font-size:'+fontSize+'px;">'+html+'</div>'+
        '</foreignObject></svg>';
      const blob = new Blob([svgStr], { type:"image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      const timeoutId = setTimeout(function(){ URL.revokeObjectURL(url); safeResolve(null); }, 2500);
      img.onload = function(){
        try{
          const scale = 3;
          const canvas = document.createElement("canvas");
          canvas.width = fullW*scale; canvas.height = fullH*scale;
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          const dataUri = canvas.toDataURL("image/png");
          clearTimeout(timeoutId); URL.revokeObjectURL(url);
          safeResolve({ dataUri: dataUri, w:fullW, h:fullH });
        }catch(err){
          clearTimeout(timeoutId); URL.revokeObjectURL(url); safeResolve(null);
        }
      };
      img.onerror = function(){ clearTimeout(timeoutId); URL.revokeObjectURL(url); safeResolve(null); };
      img.src = url;
    }catch(err){ safeResolve(null); }
  });
}
function openEquationEditor(pt, existing){
  closeEquationEditor(); closeFlyout();
  const screenPt = svgToScreen(pt);
  const panel = el("div","eqPanel");
  panel.innerHTML =
    '<div class="eqTabs">'+
      '<div class="eqTab tabUnicode">/ Unicode</div>'+
      '<div class="eqTab tabLatex">{} LaTeX</div>'+
      '<div class="eqTab tabText">ab Text</div>'+
    '</div>'+
    '<textarea></textarea>'+
    '<div class="eqSymbols"></div>'+
    '<div class="eqPreview"></div>'+
    '<div class="eqModeRow">Display: <button class="modeProf active">Professional</button><button class="modeLin">Linear</button></div>'+
    '<div class="eqActions"><button class="eqCancel">Cancel</button><button class="eqInsert">Insert</button></div>';
  appRoot.appendChild(panel);
  const maxLeft = window.innerWidth-360, maxTop = window.innerHeight-320;
  panel.style.left = Math.max(8,Math.min(maxLeft, screenPt.x))+"px";
  panel.style.top = Math.max(8,Math.min(maxTop, screenPt.y+10))+"px";
  eqPanelEl = panel;

  const textarea = panel.querySelector("textarea");
  const preview = panel.querySelector(".eqPreview");
  const symbolsRow = panel.querySelector(".eqSymbols");
  const modeRow = panel.querySelector(".eqModeRow");
  let mode = existing ? (existing.mode||"professional") : "professional";
  let inputMode = existing ? "latex" : "unicode";
  textarea.value = existing ? existing.latex : "";

  EQ_SYMBOLS.forEach(function(sym){
    const b = document.createElement("button"); b.type="button"; b.textContent=sym;
    b.onclick = ()=>{ insertAtCursor(textarea, sym); updatePreview2(); };
    symbolsRow.appendChild(b);
  });

  const PLACEHOLDERS = {
    unicode: "Type math: x^2/y + sqrt(2) or unicode π, ≤, α directly",
    latex: "Type raw LaTeX: \\frac{a}{b} + \\sqrt{2} \\le \\pi",
    text: "Type plain text (no math formatting)"
  };
  function setInputMode(m){
    inputMode = m;
    panel.querySelector(".tabUnicode").classList.toggle("active", m==="unicode");
    panel.querySelector(".tabLatex").classList.toggle("active", m==="latex");
    panel.querySelector(".tabText").classList.toggle("active", m==="text");
    textarea.placeholder = PLACEHOLDERS[m];
    modeRow.style.opacity = m==="text" ? 0.4 : 1;
    modeRow.style.pointerEvents = m==="text" ? "none" : "auto";
    updatePreview2();
  }
  panel.querySelector(".tabUnicode").onclick = ()=> setInputMode("unicode");
  panel.querySelector(".tabLatex").onclick = ()=> setInputMode("latex");
  panel.querySelector(".tabText").onclick = ()=> setInputMode("text");
  setInputMode(inputMode);

  function setMode(m){
    mode = m;
    panel.querySelector(".modeProf").classList.toggle("active", m==="professional");
    panel.querySelector(".modeLin").classList.toggle("active", m==="linear");
    updatePreview2();
  }
  panel.querySelector(".modeProf").onclick = ()=> setMode("professional");
  panel.querySelector(".modeLin").onclick = ()=> setMode("linear");

  function computeLatex(){
    const raw = textarea.value;
    if (inputMode==="latex") return raw;
    return linearToLatex(raw); // unicode/autocorrect mode
  }
  function updatePreview2(){
    const raw = textarea.value;
    preview.innerHTML = "";
    if (!raw) return;
    if (inputMode==="text" || mode==="linear"){
      const d = document.createElement("div");
      d.style.fontFamily="Georgia,serif"; d.style.fontStyle= inputMode==="text"?"normal":"italic"; d.style.fontSize="16px";
      d.textContent = raw; preview.appendChild(d);
    } else {
      try{
        const latex = computeLatex();
        if (window.katex) katex.render(latex, preview, { throwOnError:false, displayMode:true });
        else preview.textContent = latex;
      }catch(err){ preview.textContent = raw; }
    }
  }
  textarea.addEventListener("input", updatePreview2);
  updatePreview2();
  setTimeout(()=> textarea.focus(), 0);

  panel.querySelector(".eqCancel").onclick = closeEquationEditor;
  panel.querySelector(".eqInsert").onclick = async ()=>{
    const raw = textarea.value.trim();
    if (!raw){ closeEquationEditor(); return; }
    const finalMode = (inputMode==="text") ? "linear" : mode;
    closeEquationEditor();

    if (finalMode==="linear"){
      if (existing){ existing.latex = raw; existing.mode = "linear"; delete existing.png; }
      else addShape({ id:nextId(), type:"equation", x:pt.x, y:pt.y, latex:raw, mode:"linear", fontSize:state.textFontSize||18, stroke:state.strokeColor });
      renderAll(); pushHistory();
      return;
    }
    const latexFinal = computeLatex();
    const fontSize = (state.textFontSize||16)+6;
    const result = await equationToDataURI(latexFinal, fontSize, state.strokeColor);
    if (existing){
      existing.latex = latexFinal; existing.mode = "professional"; existing.fontSize = fontSize;
      if (result){ existing.png = result.dataUri; existing._w = result.w; existing._h = result.h; existing._lastBakedFontSize = fontSize; }
    } else {
      addShape({ id:nextId(), type:"equation", x:pt.x, y:pt.y, latex:latexFinal, mode:"professional", fontSize:fontSize, stroke:state.strokeColor,
        png: result? result.dataUri : null, _w: result? result.w : 60, _h: result? result.h : 30, _lastBakedFontSize: fontSize });
    }
    renderAll(); pushHistory();
  };
  panel.addEventListener("keydown", function(e){ e.stopPropagation(); if (e.key==="Escape") closeEquationEditor(); });
}
function insertAtCursor(textarea, str){
  const start = textarea.selectionStart, end = textarea.selectionEnd;
  textarea.value = textarea.value.slice(0,start)+str+textarea.value.slice(end);
  textarea.focus(); textarea.selectionStart = textarea.selectionEnd = start+str.length;
}
function renderEquationShape(s){
  const g = svgEl("g",{"data-id":s.id});
  if (s.mode==="linear"){
    const t = svgEl("text",{x:s.x,y:s.y,"font-size":s.fontSize, fill:s.stroke, "font-family":"Georgia,serif", "font-style":"italic"});
    t.textContent = s.latex;
    s._w = s.latex.length*s.fontSize*0.55; s._h = s.fontSize;
    g.appendChild(t); return g;
  }
  if (s.png){
    const w = s._w||60, h = s._h||30;
    const img = svgEl("image", { "data-id":s.id, x:s.x-8, y:s.y-h+6, width:w, height:h });
    img.setAttributeNS("http://www.w3.org/1999/xlink","href", s.png);
    img.setAttribute("href", s.png);
    g.appendChild(img);
    return g;
  }
  measureDiv.innerHTML=""; measureDiv.style.fontSize = s.fontSize+"px";
  let html = "";
  try{ if (window.katex) html = katex.renderToString(s.latex, { throwOnError:false, displayMode:false }); }catch(err){}
  if (!html) html = "<span style='font-family:Georgia,serif;font-style:italic'>"+s.latex+"</span>";
  measureDiv.innerHTML = html;
  const w = Math.max(measureDiv.offsetWidth, 20), h = Math.max(measureDiv.offsetHeight, 20);
  s._w=w; s._h=h;
  const fo = svgEl("foreignObject", { x:s.x-6, y:s.y-h-2, width:w+24, height:h+16 });
  const div = document.createElement("div");
  div.style.cssText = "color:"+s.stroke+"; padding:2px 8px; display:inline-block;";
  div.innerHTML = html;
  fo.appendChild(div); g.appendChild(fo);
  return g;
}

/* ---------------------------------------------------------------------
   ZOOM / VIEW
--------------------------------------------------------------------- */
function zoomBy(factor, centerClient){
  const center = centerClient ? screenToSVG(centerClient.x, centerClient.y) : { x:state.vb.x+state.vb.w/2, y:state.vb.y+state.vb.h/2 };
  const newW = Math.max(120, Math.min(6000, state.vb.w*factor));
  const newH = newW * (state.vb.h/state.vb.w);
  state.vb.x = center.x - (center.x-state.vb.x)*(newW/state.vb.w);
  state.vb.y = center.y - (center.y-state.vb.y)*(newH/state.vb.h);
  state.vb.w = newW; state.vb.h = newH;
  setViewBox();
  if (state.shapes.some(function(s){return s.type==="funcplot";})) renderAll();
}
function resetView(){ const r = canvasWrap.getBoundingClientRect(); state.vb = { x:0,y:0,w:1000,h:1000*(r.height/r.width) }; setViewBox(); }
function fitToContent(){
  if (!state.shapes.length){ resetView(); return; }
  const bb = overallBBox(state.shapes);
  const pad = 40; const r = canvasWrap.getBoundingClientRect();
  const w = (bb.maxX-bb.minX)+pad*2, h = (bb.maxY-bb.minY)+pad*2;
  const aspect = r.height/r.width;
  let vw=w, vh=w*aspect; if (vh<h){ vh=h; vw=h/aspect; }
  state.vb = { x: bb.minX-pad-(vw-w)/2, y: bb.minY-pad-(vh-h)/2, w:vw, h:vh };
  setViewBox();
}

/* ---------------------------------------------------------------------
   BBOX
--------------------------------------------------------------------- */
function shapePoints(s){
  switch(s.type){
    case "point": case "text": return [{x:s.x,y:s.y}];
    case "equation": return [{x:s.x,y:s.y},{x:s.x+(s._w||60),y:s.y-(s._h||20)}];
    case "segment": case "vector": case "ray": case "matchstick": case "dialhand": case "bearing": return [{x:s.x1,y:s.y1},{x:s.x2,y:s.y2}];
    case "rect": case "shape3d": case "shape2d": case "image": case "table": case "statsgraph": case "venn2": case "venn3":
    case "numberline": case "graphpaper": case "unitcircle": case "tree": case "clock": case "pascal": case "earth":
      return [{x:s.x,y:s.y},{x:s.x+s.w,y:s.y+s.h}];
    case "circle": case "ellipse": return [{x:s.cx-s.rx,y:s.cy-s.ry},{x:s.cx+s.rx,y:s.cy+s.ry}];
    case "polyline": case "triangle": case "polygon": case "freehand": case "custom": case "smoothline": return s.points;
    case "angle": return [s.p1,s.p2,s.p3];
    case "distance": return [s.p1,s.p2];
    default: return [];
  }
}
function overallBBox(shapes){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  shapes.forEach(function(s){ shapePoints(s).forEach(function(p){
    minX=Math.min(minX,p.x); minY=Math.min(minY,p.y); maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y);
  }); });
  if (!isFinite(minX)){ minX=0;minY=0;maxX=1000;maxY=650; }
  return {minX:minX,minY:minY,maxX:maxX,maxY:maxY};
}

/* ---------------------------------------------------------------------
   EXPORT
--------------------------------------------------------------------- */
function buildExportSVG(){
  const bb = overallBBox(state.shapes);
  const pad = 30;
  const w = (bb.maxX-bb.minX)+pad*2, h=(bb.maxY-bb.minY)+pad*2;
  const clone = document.createElementNS(NS,"svg");
  clone.setAttribute("xmlns",NS);
  clone.setAttribute("viewBox", (bb.minX-pad)+" "+(bb.minY-pad)+" "+w+" "+h);
  clone.setAttribute("width", w); clone.setAttribute("height", h);
  const defsClone = defs.cloneNode(true);
  clone.appendChild(defsClone);
  const layerClone = shapesLayer.cloneNode(true);
  // Safety net: any equation that never got baked to a PNG falls back to a live
  // <foreignObject>, which can silently taint the export canvas in some browsers.
  // Swap any leftover foreignObject for a plain text approximation so export/copy
  // always succeeds for every shape on the canvas.
  layerClone.querySelectorAll("foreignObject").forEach(function(fo){
    const g = fo.parentNode;
    const id = g && g.getAttribute("data-id");
    const shape = id ? findShape(id) : null;
    const label = (shape && shape.latex) ? shape.latex : (fo.textContent||"");
    const fallbackText = svgEl("text", {
      x: shape? shape.x : 0, y: shape? shape.y : 0,
      "font-size": (shape && shape.fontSize) || 18, fill: (shape && shape.stroke) || "#1c2430",
      "font-family":"Georgia,serif", "font-style":"italic"
    });
    fallbackText.textContent = label;
    fo.replaceWith(fallbackText);
  });
  clone.appendChild(layerClone);
  return { svgEl: clone, w: w, h: h };
}
function exportSVG(){
  const built = buildExportSVG();
  const src = new XMLSerializer().serializeToString(built.svgEl);
  const blob = new Blob([src], { type:"image/svg+xml" });
  triggerDownload(URL.createObjectURL(blob), "mathdraw-figure.svg");
}
function exportPNG(){
  rasterize(4).then(function(dataUrl){
    if (dataUrl) triggerDownload(dataUrl, "mathdraw-figure.png");
    else statusBar.textContent = "PNG export failed — try again, or use Export SVG instead.";
  });
}
function copyPNG(){
  rasterize(4).then(async function(dataUrl){
    if (!dataUrl){ statusBar.textContent = "Copy failed — try Export PNG instead."; return; }
    try{
      const res = await fetch(dataUrl); const blob = await res.blob();
      await navigator.clipboard.write([ new ClipboardItem({ "image/png": blob }) ]);
      statusBar.textContent = "Figure copied to clipboard as PNG.";
    }catch(err){ statusBar.textContent = "Clipboard copy not supported here — use Export PNG instead."; }
  });
}
function rasterize(scale){
  return new Promise(function(resolve){
    let settled = false;
    function safeResolve(v){ if (!settled){ settled=true; resolve(v); } }
    try{
      const built = buildExportSVG();
      const src = new XMLSerializer().serializeToString(built.svgEl);
      const blob = new Blob([src], { type:"image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      const timeoutId = setTimeout(function(){ URL.revokeObjectURL(url); safeResolve(null); }, 4000);
      img.onload = function(){
        try{
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1,Math.round(built.w*scale)); canvas.height = Math.max(1,Math.round(built.h*scale));
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          const dataUrl = canvas.toDataURL("image/png");
          clearTimeout(timeoutId); URL.revokeObjectURL(url);
          safeResolve(dataUrl);
        }catch(err){ clearTimeout(timeoutId); URL.revokeObjectURL(url); safeResolve(null); }
      };
      img.onerror = function(){ clearTimeout(timeoutId); URL.revokeObjectURL(url); safeResolve(null); };
      img.src = url;
    }catch(err){ safeResolve(null); }
  });
}
function triggerDownload(url, filename){
  const a = document.createElement("a"); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}

/* ---------------------------------------------------------------------
   RESIZE
--------------------------------------------------------------------- */
function refreshLayout(){
  const r = canvasWrap.getBoundingClientRect();
  if (r.width<=0 || r.height<=0) return;
  state.vb.h = state.vb.w*(r.height/r.width);
  setViewBox();
}
let layoutRefreshTimer = null;
function scheduleLayoutRefresh(delay){
  clearTimeout(layoutRefreshTimer);
  layoutRefreshTimer = setTimeout(refreshLayout, delay==null?60:delay);
}
new ResizeObserver(function(){ scheduleLayoutRefresh(0); }).observe(canvasWrap);
window.addEventListener("resize", function(){ scheduleLayoutRefresh(80); });
window.addEventListener("orientationchange", function(){ scheduleLayoutRefresh(150); });
if (window.screen && window.screen.orientation){
  window.screen.orientation.addEventListener("change", function(){ scheduleLayoutRefresh(150); });
}

/* init */
setTool("select");
resetView();
renderAll();

})();

</script>
</body>
